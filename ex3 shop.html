<h2 align="center">Shopping Cart</h2>

<div id="dropbox"
ondragover="allowDrop(event)"
ondrop="drop(event)">

<h3 align="center">Purchased List</h3>

</div>

<hr>

<script>

function allowDrop(ev)
{
    ev.preventDefault();
}

function drag(ev)
{
    ev.dataTransfer.setData("text",ev.target.id);
}

function drop(ev)
{
    ev.preventDefault();

    var data=ev.dataTransfer.getData("text");

    var node=document.getElementById(data).cloneNode(true);

    node.width=80;
    node.height=80;

    ev.target.appendChild(document.createElement("br"));
    ev.target.appendChild(node);
}

function getLocation()
{
    if(navigator.geolocation)
    {
        navigator.geolocation.getCurrentPosition(showPosition);
    }
    else
    {
        document.getElementById("location").innerHTML="Geolocation not supported";
    }
}

function showPosition(position)
{
    document.getElementById("location").innerHTML=
    "Latitude : "+position.coords.latitude+
    "<br>Longitude : "+position.coords.longitude;
}

</script>
